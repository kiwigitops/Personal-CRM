services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    build:
      context: ..
      dockerfile: personal-crm-clients/apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: personal-crm-api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 4000
      APP_URL: ${APP_URL:-http://localhost:8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/personal_crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-refresh-secret-change-me}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-key}
      MAIL_FROM: ${MAIL_FROM:-hello@personal-crm.local}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "4000:4000"

  agents:
    build:
      context: ..
      dockerfile: personal-crm-agents/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 4100
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/personal_crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MEMORY_PROVIDER: native
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "4100:4100"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_crm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_crm}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus:v3.3.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.6.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  minio-data:
  grafana-data:
