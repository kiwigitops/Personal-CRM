apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-crm-api
  namespace: personal-crm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: personal-crm-api
  template:
    metadata:
      labels:
        app: personal-crm-api
    spec:
      containers:
        - name: api
          image: personal-crm-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: personal-crm-secrets
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-crm-web
  namespace: personal-crm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: personal-crm-web
  template:
    metadata:
      labels:
        app: personal-crm-web
    spec:
      containers:
        - name: web
          image: personal-crm-web:latest
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-crm-agents
  namespace: personal-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-crm-agents
  template:
    metadata:
      labels:
        app: personal-crm-agents
    spec:
      containers:
        - name: agents
          image: personal-crm-agents:latest
          ports:
            - containerPort: 4100
          envFrom:
            - secretRef:
                name: personal-crm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: personal-crm-api
  namespace: personal-crm
spec:
  selector:
    app: personal-crm-api
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: personal-crm-web
  namespace: personal-crm
spec:
  selector:
    app: personal-crm-web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: personal-crm-agents
  namespace: personal-crm
spec:
  selector:
    app: personal-crm-agents
  ports:
    - port: 4100
      targetPort: 4100
